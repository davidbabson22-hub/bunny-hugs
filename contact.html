<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Bunny Hugs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--accent-cream);">

  <div class="container" style="padding-top: 80px; max-width: 600px;">
    <div style="background: var(--white); padding: 40px; border-radius: var(--radius-md); box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
      <h2 style="margin-bottom: 10px; color: var(--primary-color);">Get In Touch With Us</h2>
      <p style="margin-bottom: 24px;">Have questions about our premium product line? Drop your details below.</p>
      
      <form onsubmit="event.preventDefault(); alert('Message Received!');" style="display: flex; flex-direction: column; gap: 16px;">
        <div>
          <label style="display:block; margin-bottom:6px; font-weight:600; font-size:0.85rem;">Name</label>
          <input type="text" placeholder="Your Name" style="width:100%; padding:12px; border:1px solid rgba(10,25,47,0.1); border-radius:var(--radius-sm); font-family:inherit;">
        </div>
        <div>
          <label style="display:block; margin-bottom:6px; font-weight:600; font-size:0.85rem;">Email Address</label>
          <input type="email" placeholder="you@domain.com" style="width:100%; padding:12px; border:1px solid rgba(10,25,47,0.1); border-radius:var(--radius-sm); font-family:inherit;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">Send Message</button>
      </form>
      
      <p style="margin-top: 20px; text-align: center;"><a href="index.html" style="color: var(--primary-light); font-size:0.9rem; font-weight:600;">&larr; Back to Home</a></p>
    </div>
  </div>

</body>
</html>
